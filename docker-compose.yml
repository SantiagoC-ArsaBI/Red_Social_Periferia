version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: periferia_social
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d periferia_social"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/periferia_social
      PORT: 3001
      JWT_SECRET: supersecret
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"

  user-service:
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/periferia_social
      JWT_SECRET: supersecret
      PORT: 3002
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3002:3002"

  post-service:
    build:
      context: ./backend
      dockerfile: services/post-service/Dockerfile
    container_name: post-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/periferia_social
      JWT_SECRET: supersecret
      PORT: 3003
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3003:3003"

  seeder:
    build:
      context: ./backend
      dockerfile: services/seeder-service/Dockerfile
    container_name: seeder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/periferia_social
    restart: "no"

  frontend:
    build:
      context: ./frontend
      args:
        # Rutas relativas: el navegador pide a localhost:5173/api/... y nginx hace proxy al backend (evita CORS)
        VITE_AUTH_API_URL: /api
        VITE_USER_API_URL: /api
        VITE_POST_API_URL: /api
        VITE_WS_LIKES_URL: http://localhost:5173
    container_name: frontend
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      post-service:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  postgres-data:

